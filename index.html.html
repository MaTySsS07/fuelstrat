<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0c">
<title>FuelStrat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ── Themes ─────────────────────────────────────────────────────── */
:root[data-theme="dark"] {
  --bg:#0a0a0c; --surface:#111115; --surface2:#18181f; --surface3:#1f1f28;
  --border:#2a2a35; --accent:#e8ff00; --accent2:#ff6b35;
  --red:#ff3b3b; --green:#39ff84; --text:#e8e8f0; --muted:#5a5a6e;
  --grid:rgba(232,255,0,0.025); --shadow:rgba(0,0,0,0.5);
}
:root[data-theme="light"] {
  --bg:#f0f0ec; --surface:#ffffff; --surface2:#f5f5f0; --surface3:#ebebeb;
  --border:#d0d0c8; --accent:#1a1a2e; --accent2:#d45a10;
  --red:#cc2222; --green:#1a8a44; --text:#1a1a28; --muted:#909088;
  --grid:rgba(26,26,46,0.035); --shadow:rgba(0,0,0,0.1);
}
/* ── Reset ───────────────────────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{
  height:100%;background:var(--bg);color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;font-size:16px;line-height:1.5;
  overflow:hidden;transition:background .3s,color .3s;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:40px 40px;
}
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
/* ── Topbar ──────────────────────────────────────────────────────── */
.topbar{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100}
.topbar-logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer}
.logo-hex{width:32px;height:32px;background:var(--accent);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-hex svg{width:16px;height:16px;fill:var(--bg)}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.15em;line-height:1;color:var(--text)}
.logo-text span{color:var(--accent)}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-icon{width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--muted);font-size:1rem}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
#page{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
/* ── Animations ──────────────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.anim-up{animation:fadeUp .35s ease both}
.anim-in{animation:fadeIn .25s ease both}
/* ── Typography ──────────────────────────────────────────────────── */
.label{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.mono{font-family:'IBM Plex Mono',monospace}
.display{font-family:'Bebas Neue',sans-serif;letter-spacing:.1em}
/* ── Cards ───────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);padding:16px;position:relative;transition:background .3s,border-color .2s}
.card.clickable{cursor:pointer}
.card.clickable:hover{border-color:var(--accent)}
.card.clickable:active{opacity:.85}
.card-accent::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent)}
.card-accent-top::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
/* ── Buttons ─────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.2em;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--red);color:#fff}
.btn-full{width:100%}
.btn-sm{padding:8px 14px;font-size:.8rem}
.btn-big{width:100%;padding:22px;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.3em;border:none;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.btn-big:active{transform:scale(.97)}
.btn-pit{background:var(--accent2);color:#fff}
.btn-sc{background:#f0c000;color:#111}
.btn-start{background:var(--accent);color:var(--bg)}
/* ── Forms ───────────────────────────────────────────────────────── */
.field{margin-bottom:16px}
.field-label{display:block;font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field-label .req{color:var(--accent);margin-left:3px}
.field-hint{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--muted);margin-top:5px;line-height:1.5}
input[type="text"],input[type="number"],input[type="date"],textarea,select{
  width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  font-family:'IBM Plex Mono',monospace;font-size:.95rem;padding:12px 14px;outline:none;
  transition:border-color .2s,background .3s;appearance:none;-webkit-appearance:none;border-radius:0;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(128,128,0,.1)}
input::placeholder,textarea::placeholder{color:var(--muted);font-size:.85rem}
textarea{resize:vertical;min-height:80px}
.input-unit{position:relative}
.input-unit input{padding-right:50px}
.input-unit .unit{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--accent);pointer-events:none}
.time-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.time-inputs .field-label{font-size:.55rem}
.toggle-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:border-color .2s;margin-bottom:12px}
.toggle-row:hover{border-color:var(--accent)}
.toggle-row input[type="checkbox"]{width:17px;height:17px;accent-color:var(--accent);flex-shrink:0}
.toggle-row .toggle-label{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--text)}
.seg-ctrl{display:flex;border:1px solid var(--border)}
.seg-btn{flex:1;padding:11px 8px;background:transparent;border:none;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.seg-btn.active{background:var(--accent);color:var(--bg);font-weight:600}
/* ── UI Elements ─────────────────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:16px 0}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.2em;color:var(--muted);display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-title .dot{width:6px;height:6px;background:var(--accent);border-radius:50%}
.section-title .line{flex:1;height:1px;background:var(--border)}
.badge{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;padding:3px 8px;border:1px solid currentColor}
.badge-active{color:var(--green)}.badge-done{color:var(--muted)}.badge-pending{color:var(--accent2)}
.session-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.session-pill{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.session-pill.active{border-color:var(--accent);color:var(--accent)}
.session-pill.done{border-color:var(--border);color:var(--muted);text-decoration:line-through}
.source-tag{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border:1px solid currentColor}
.source-estimated{color:var(--muted)}.source-measured{color:var(--green)}
.error-box{padding:12px 14px;background:rgba(255,59,59,.08);border:1px solid rgba(255,59,59,.3);color:var(--red);font-family:'IBM Plex Mono',monospace;font-size:.75rem;line-height:1.5;display:none}
.error-box.show{display:block}
.info-note{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;background:rgba(128,128,0,.04);border:1px solid rgba(128,128,0,.15);font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--muted);line-height:1.6}
/* ── Modal ───────────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;animation:fadeIn .2s ease}
.modal-sheet{width:100%;max-height:85vh;background:var(--surface);border-top:3px solid var(--accent);padding:24px 16px 32px;overflow-y:auto;animation:fadeUp .3s ease;position:relative}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.2em;margin-bottom:20px}
.modal-close{position:absolute;top:16px;right:16px;font-size:1.2rem;cursor:pointer;color:var(--muted);background:none;border:none;width:36px;height:36px;display:flex;align-items:center;justify-content:center}
/* ── Wizard ──────────────────────────────────────────────────────── */
.wizard-progress{display:flex;gap:4px;margin-bottom:24px}
.wizard-step-dot{height:3px;flex:1;background:var(--border);transition:background .3s}
.wizard-step-dot.done{background:var(--accent)}
.wizard-step-dot.current{background:var(--accent2)}
.wizard-block{animation:fadeUp .3s ease}
.wizard-block-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.2em;margin-bottom:6px}
.wizard-block-sub{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--muted);margin-bottom:20px;line-height:1.6}
/* ── Recap ───────────────────────────────────────────────────────── */
.recap-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.recap-row:last-child{border-bottom:none}
.recap-key{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--muted)}
.recap-val{font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--text);font-weight:600}
.recap-edit{font-size:.7rem;color:var(--accent);cursor:pointer;font-family:'IBM Plex Mono',monospace}
/* ── Home ────────────────────────────────────────────────────────── */
.home-section{padding:16px}
.home-section+.home-section{padding-top:0}
.event-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.event-card-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.1em;line-height:1.1}
.event-card-circuit{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--muted);margin-top:3px}
.event-card-date{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--muted);text-align:right}
/* ── Strategy ────────────────────────────────────────────────────── */
.strat-card{background:var(--surface2);border:1px solid var(--border);padding:16px;margin-bottom:10px;position:relative;transition:border-color .2s}
.strat-card.best{border-color:var(--accent)}
.strat-card.best::after{content:'OPTIMAL';position:absolute;top:-1px;right:12px;background:var(--accent);color:var(--bg);font-family:'IBM Plex Mono',monospace;font-size:.55rem;font-weight:600;letter-spacing:.15em;padding:3px 7px}
.strat-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.strat-stops{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;line-height:1}
.strat-stops-lbl{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--muted)}
.strat-time{margin-left:auto;text-align:right}
.strat-total{font-family:'IBM Plex Mono',monospace;font-size:.78rem;font-weight:600}
.strat-delta{font-family:'IBM Plex Mono',monospace;font-size:.6rem;margin-top:2px}
.strat-delta.ref{color:var(--accent)}.strat-delta.slower{color:var(--accent2)}
.stint-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;margin-bottom:4px;border-left:2px solid var(--accent);background:rgba(128,128,0,.04);font-family:'IBM Plex Mono',monospace;font-size:.67rem}
.stint-row.pit-row{border-left-color:var(--accent2);background:rgba(200,80,20,.05)}
.stint-row-fuel{font-weight:600;color:var(--accent)}
.stint-row-fuel.refuel{color:var(--accent2)}
/* ── Race mode ───────────────────────────────────────────────────── */
.chrono{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:.05em;line-height:1;color:var(--accent);text-align:center}
.chrono.running{animation:pulse 2s ease-in-out infinite}
.pit-window{height:8px;background:var(--surface2);border:1px solid var(--border);position:relative;overflow:hidden;margin:8px 0}
.pit-window-fill{position:absolute;top:0;left:0;height:100%;transition:width .5s,background .5s}
.pit-window-fill.safe{background:var(--green)}.pit-window-fill.ideal{background:var(--accent)}.pit-window-fill.warning{background:var(--accent2)}.pit-window-fill.critical{background:var(--red)}
.fuel-bar-wrap{height:6px;background:var(--surface2);border:1px solid var(--border)}
.fuel-bar-fill{height:100%;background:var(--accent);transition:width .4s,background .4s}
.fuel-bar-fill.low{background:var(--accent2)}.fuel-bar-fill.critical{background:var(--red)}
.tyre-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.tyre-box{background:var(--surface2);border:1px solid var(--border);padding:8px;text-align:center}
.tyre-pos{font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--muted);letter-spacing:.1em;margin-bottom:4px}
.tyre-val{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--accent);line-height:1}
.tyre-val.warn{color:var(--accent2)}.tyre-val.crit{color:var(--red)}
/* ── Agenda ──────────────────────────────────────────────────────── */
.agenda-item{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border)}
.agenda-item:last-child{border-bottom:none}
.agenda-time{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--accent);width:48px;flex-shrink:0;margin-top:2px}
.agenda-title{font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--text);font-weight:600}
.agenda-desc{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--muted);margin-top:2px;line-height:1.5}
.agenda-priority{font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;margin-top:4px;font-family:'IBM Plex Mono',monospace}
.agenda-priority.essential{color:var(--accent2)}.agenda-priority.bonus{color:var(--muted)}
/* ── Stints bar ──────────────────────────────────────────────────── */
.stints-bar{display:flex;gap:3px;height:6px;margin:12px 0}
.stint-seg{flex:1;background:var(--accent);opacity:.55}
/* ── Utilities ───────────────────────────────────────────────────── */
.hidden{display:none!important}
.p-16{padding:16px}.pb-safe{padding-bottom:env(safe-area-inset-bottom,16px)}
.flex{display:flex}.flex-col{flex-direction:column}.flex-1{flex:1}.w-full{width:100%}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.text-center{text-align:center}.text-accent{color:var(--accent)}.text-muted{color:var(--muted)}.text-danger{color:var(--red)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border)}
@media(min-width:600px){#app{max-width:430px;margin:0 auto;box-shadow:0 0 60px var(--shadow)}body{display:flex;justify-content:center}}
/* ── Focus mode ──────────────────────────────────────────────────── */
.focus-val{font-family:'Bebas Neue',sans-serif;font-size:5rem;line-height:1;color:var(--accent);text-align:center;letter-spacing:.05em}
.focus-label{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:6px}
/* ── Data row ────────────────────────────────────────────────────── */
.data-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.data-row:last-child{border-bottom:none}
.data-key{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--muted)}
.data-val{font-family:'IBM Plex Mono',monospace;font-size:.85rem;font-weight:600}
/* ── Inline edit ─────────────────────────────────────────────────── */
.inline-edit{display:flex;align-items:center;gap:6px}
.inline-edit input{width:80px;padding:6px 8px;font-size:.85rem}
.inline-edit .unit-label{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--accent)}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="topbar-logo" onclick="App.go('home')">
      <div class="logo-hex">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.8l7.2 3.6L12 12 4.8 8.4 12 4.8zM4 9.6l7 3.5V19l-7-3.5V9.6zm9 9.4v-6.3l7-3.5v6.3L13 19z"/></svg>
      </div>
      <div class="logo-text">FUEL <span>STRAT</span></div>
    </div>
    <div class="topbar-actions">
      <button class="btn-icon" id="btn-back" onclick="App.back()" title="Retour" style="display:none">←</button>
      <button class="btn-icon" onclick="App.toggleTheme()" title="Thème">☀</button>
    </div>
  </header>
  <div id="page"></div>
</div>

<script>
/* ================================================================
   DB — IndexedDB wrapper
================================================================ */
const DB = (() => {
  let db;
  const VERSION = 1;
  const open = () => new Promise((res, rej) => {
    if (db) return res(db);
    const req = indexedDB.open('fuelstrat', VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('events')) d.createObjectStore('events', {keyPath:'id'});
      if (!d.objectStoreNames.contains('cars'))   d.createObjectStore('cars',   {keyPath:'id'});
      if (!d.objectStoreNames.contains('settings'))d.createObjectStore('settings',{keyPath:'key'});
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = e => rej(e.target.error);
  });
  const tx = (store, mode='readonly') => open().then(d => d.transaction(store, mode).objectStore(store));
  const getAll = store => tx(store).then(s => new Promise((r,j) => { const req=s.getAll(); req.onsuccess=()=>r(req.result); req.onerror=()=>j(req.error); }));
  const get    = (store,key) => tx(store).then(s => new Promise((r,j) => { const req=s.get(key); req.onsuccess=()=>r(req.result); req.onerror=()=>j(req.error); }));
  const put    = (store,val) => tx(store,'readwrite').then(s => new Promise((r,j) => { const req=s.put(val); req.onsuccess=()=>r(req.result); req.onerror=()=>j(req.error); }));
  const del    = (store,key) => tx(store,'readwrite').then(s => new Promise((r,j) => { const req=s.delete(key); req.onsuccess=()=>r(); req.onerror=()=>j(req.error); }));
  return { getAll, get, put, del };
})();

/* ================================================================
   UTILS
================================================================ */
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const fmt  = ms => { const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60); return h?`${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`:`${m}:${String(s%60).padStart(2,'0')}`; };
const fmtLap = ms => { const s=Math.floor(ms/1000),m=Math.floor(s/60); return `${m}:${String(s%60).padStart(2,'0')}.${String(Math.floor((ms%1000)/10)).padStart(2,'0')}`; };
const round1 = v => Math.round(v*10)/10;
const el = id => document.getElementById(id);
const html = (id,h) => { const e=el(id); if(e) e.innerHTML=h; };

/* ================================================================
   APP — Router & state
================================================================ */
const App = (() => {
  let stack = [];
  let theme = localStorage.getItem('theme') || 'dark';

  const init = async () => {
    document.documentElement.setAttribute('data-theme', theme);
    await go('home');
  };

  const go = async (page, data={}) => {
    stack.push({page, data});
    el('btn-back').style.display = stack.length > 1 ? 'flex' : 'none';
    await render(page, data);
  };

  const back = async () => {
    if (stack.length <= 1) return;
    stack.pop();
    const prev = stack[stack.length - 1];
    await render(prev.page, prev.data);
    el('btn-back').style.display = stack.length > 1 ? 'flex' : 'none';
  };

  const replace = async (page, data={}) => {
    stack[stack.length - 1] = {page, data};
    await render(page, data);
  };

  const toggleTheme = () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', theme);
    document.documentElement.setAttribute('data-theme', theme);
  };

  const render = async (page, data) => {
    const pageEl = el('page');
    pageEl.innerHTML = '<div style="padding:32px;text-align:center;color:var(--muted);font-family:\'IBM Plex Mono\',monospace;font-size:.7rem">Chargement...</div>';
    try {
      await Pages[page](data);
    } catch(e) {
      pageEl.innerHTML = `<div class="p-16"><div class="error-box show">Erreur: ${e.message}</div></div>`;
      console.error(e);
    }
  };

  return { init, go, back, replace, toggleTheme };
})();

/* ================================================================
   STRATEGY ENGINE
================================================================ */
const Strat = {
  // fuelFixed : si défini, c'est le carbu de départ imposé (litres au départ)
  // tankMax   : capacité max du réservoir
  // fuelPerLap: conso par tour
  compute(race) {
    const { laps, lapTime, fuelPerLap, tankMax, fuelFixed, minStops, safetyCar } = race;
    const sc = safetyCar ? 1.05 : 1;
    const totalFuelNeeded = round1(fuelPerLap * laps * sc);

    // Carbu disponible au départ
    const startFuel = fuelFixed != null ? Math.min(fuelFixed, tankMax) : tankMax;
    // Carbu qu'il reste à ajouter aux stands (au-delà du départ)
    const fuelToAdd = Math.max(0, totalFuelNeeded - startFuel);
    // Arrêts minimum pour apporter ce carbu (en remplissant jusqu'au max à chaque arrêt)
    const stopsForFuel = fuelToAdd > 0 ? Math.ceil(fuelToAdd / tankMax) : 0;
    const minStopsNeeded = Math.max(minStops || 0, stopsForFuel);

    const results = [];

    for (let stops = minStopsNeeded; stops <= minStopsNeeded + 3; stops++) {
      const stints = stops + 1;
      // Distribuer les tours équitablement entre les relais
      const baseLaps = Math.floor(laps / stints);
      const extra    = laps % stints;
      const lapDist  = Array.from({length:stints}, (_,i) => baseLaps + (i < extra ? 1 : 0));

      let stintDetails = [];

      if (stops === 0) {
        // Pas d'arrêt : un seul relais avec le carbu de départ
        stintDetails.push({laps, fuel: startFuel, refuel: 0, type:'stint'});
      } else {
        // Premier relais limité par le carbu de départ
        const firstMaxLaps = Math.floor(startFuel / fuelPerLap);
        const firstLaps = Math.min(lapDist[0], firstMaxLaps);
        stintDetails.push({laps: firstLaps, fuel: startFuel, refuel: 0, type:'stint'});

        // Carbu restant après le premier relais
        let fuelLeft = totalFuelNeeded - startFuel + (startFuel - firstLaps * fuelPerLap);
        const remainingLaps = laps - firstLaps;
        const remainingStints = stints - 1;

        for (let i = 0; i < remainingStints; i++) {
          const sl = i === 0
            ? remainingLaps - baseLaps * (remainingStints - 1) - (extra > 1 ? extra - 1 : 0)
            : baseLaps + (i < extra ? 1 : 0);
          const stintLaps = Math.max(1, Math.round(remainingLaps / remainingStints));
          const actualLaps = i === remainingStints - 1
            ? laps - stintDetails.filter(d=>d.type==='stint').reduce((a,s)=>a+s.laps,0)
            : Math.round(remainingLaps / remainingStints);
          const fuelNeeded = round1(Math.min(actualLaps * fuelPerLap + 0.5, tankMax));
          stintDetails.push({type:'pit', refuel: fuelNeeded});
          stintDetails.push({laps: actualLaps, fuel: fuelNeeded, refuel: fuelNeeded, type:'stint'});
        }
      }

      // Recalcul propre si logique ci-dessus produit des laps incohérents
      // → Utiliser la distribution simple équilibrée
      const totalLapsCheck = stintDetails.filter(d=>d.type==='stint').reduce((a,s)=>a+s.laps,0);
      if (totalLapsCheck !== laps || stintDetails.filter(d=>d.type==='stint').some(s=>s.laps<=0)) {
        // Fallback : distribution simple
        stintDetails = [];
        for (let i = 0; i < stints; i++) {
          const sl = lapDist[i];
          const f = i === 0 ? startFuel : round1(Math.min(sl * fuelPerLap + 0.5, tankMax));
          if (i > 0) stintDetails.push({type:'pit', refuel: f});
          stintDetails.push({laps: sl, fuel: f, refuel: i === 0 ? 0 : f, type:'stint'});
        }
      }

      const totalTime = laps * lapTime + stops * 22000;
      results.push({ stops, stints, stintDetails, totalTime, totalFuel: totalFuelNeeded, startFuel });
    }

    results.sort((a,b) => a.totalTime - b.totalTime);
    return results;
  }
};

function wzNext(step) {
  const d = WZ.data;
  const errEl = el('wz-err');
  if (errEl) { errEl.textContent=''; errEl.classList.remove('show'); }

  const err = msg => { if(errEl){errEl.textContent=msg;errEl.classList.add('show');} return false; };

  if (step === 0) {
    const name = el('wz-name')?.value.trim();
    if (!name) return err('Le nom est obligatoire');
    d.name = name;
    d.circuit = el('wz-circuit')?.value.trim();
    d.date = el('wz-date')?.value;
    App.go('wizard', {step:1, data:d});

  } else if (step === 1) {
    d.hasEL   = el('wz-el')?.checked;
    d.hasQ    = el('wz-q')?.checked;
    d.raceByLaps = el('wz-race-mode')?.querySelector('.active')?.textContent === 'Tours';
    d.raceH = +el('wz-rh')?.value||0;
    d.raceM = +el('wz-rm')?.value||0;
    d.raceS = +el('wz-rs')?.value||0;
    d.raceLaps = +el('wz-rlaps')?.value||30;
    const raceMs = d.raceH*3600000+d.raceM*60000+d.raceS*1000;
    if (!d.raceByLaps && raceMs < 60000) return err('Durée trop courte (min 1 minute)');
    if (d.raceByLaps && d.raceLaps < 1) return err('Nombre de tours invalide');
    App.go('wizard', {step:2, data:d});

  } else if (step === 2) {
    d.fuelFixed    = el('wz-fixed')?.checked;
    d.fuelFixedVal = +el('wz-fval')?.value||0;
    d.minStops     = +el('wz-minstops')?.value||0;
    d.safetyCar    = el('wz-sc')?.checked;
    App.go('wizard', {step:3, data:d});

  } else if (step === 3) {
    if (d.carId) {
      // Profil existant : toutes les données déjà chargées dans wzCarChange
      App.go('wizard', {step:4, data:d});
    } else {
      const carName = el('wz-carname')?.value.trim();
      const tankMax = +el('wz-tank')?.value;
      if (!carName) return err('Nom de voiture obligatoire');
      if (!tankMax || tankMax < 1) return err('Capacité réservoir obligatoire');
      d.carName    = carName;
      d.tankMax    = tankMax;
      d.fuelPerLap = +el('wz-conso')?.value || null;
      d.tyreConv   = el('wz-tyre-conv')?.querySelector('.active')?.textContent === '0→100' ? '0to100' : '100to0';
      App.go('wizard', {step:4, data:d});
    }

  } else if (step === 4) {
    const progs = ['express','standard','complet'];
    const pi    = [...el('wz-prog').querySelectorAll('.seg-btn')].findIndex(b => b.classList.contains('active'));
    d.prog        = progs[pi] || 'express';
    d.lapTimeMin  = +el('wz-ltm')?.value||2;
    d.lapTimeSec  = +el('wz-lts')?.value||0;
    d.lapTimeMs   = +el('wz-ltms')?.value||0;
    App.go('wizard', {step:5, data:d});
  }
}

async function wzCreate() {
  const d = WZ.data;
  const errEl = el('wz-err');

  // Save / update car profile
  let car;
  if (d.carId) {
    car = await DB.get('cars', d.carId);
  } else {
    car = {
      id: uid(), name: d.carName, tankMax: d.tankMax,
      fuelPerLap: d.fuelPerLap || null, tyreConv: d.tyreConv || '100to0',
      createdAt: Date.now()
    };
    await DB.put('cars', car);
  }

  const lapMs = (d.lapTimeMin||2)*60000 + (d.lapTimeSec||0)*1000 + (d.lapTimeMs||0);
  const raceMs = d.raceByLaps ? null : (d.raceH||0)*3600000+(d.raceM||30)*60000+(d.raceS||0)*1000;
  const raceLaps = d.raceByLaps ? d.raceLaps : (lapMs > 0 ? Math.ceil(raceMs/lapMs) : 30);

  // Build sessions
  const sessions = [];
  if (d.hasEL) sessions.push({id:uid(), type:'EL1', status:'pending', lapTime:lapMs, fuelPerLap: car.fuelPerLap, measurements:{}});
  if (d.hasQ)  sessions.push({id:uid(), type:'Q',   status:'pending', measurements:{}});
  sessions.push({id:uid(), type:'RACE', status:'pending', measurements:{}});

  const event = {
    id: uid(), name: d.name, circuit: d.circuit||'', date: d.date||'',
    status: 'active', carId: car.id, carSnapshot: {...car},
    raceByLaps: d.raceByLaps, raceMs, raceLaps,
    fuelFixed: d.fuelFixed ? d.fuelFixedVal : null, fuelFixedVal: d.fuelFixedVal||null,
    minStops: d.minStops||0, safetyCar: !!d.safetyCar,
    prog: d.prog||'express', lapTime: lapMs,
    fuelPerLap: car.fuelPerLap || d.fuelPerLap || null,
    tankMax: car.tankMax, tyreConv: car.tyreConv,
    sessions, createdAt: Date.now(), updatedAt: Date.now()
  };

  await DB.put('events', event);
  await App.go('event', {id: event.id});
}

function wzToggleRaceMode(byLaps) {

function wzCarChange(carId) {
  const d = WZ.data;
  d.carId = carId || null;
  const form = el('wz-car-form');
  const preview = el('wz-car-preview');

  if (carId) {

async function addEL(eventId) {
  const ev = await DB.get('events', eventId);
  const elCount = (ev.sessions||[]).filter(s => s.type.startsWith('EL')).length;
  const newSess = {
    id: uid(),
    type: 'EL' + (elCount + 1),
    status: 'pending',
    measurements: {},
    notes: ''
  };
  // Insert before Q and RACE
  const raceIdx = ev.sessions.findIndex(s => s.type === 'RACE');
  ev.sessions.splice(raceIdx, 0, newSess);
  ev.updatedAt = Date.now();
  await DB.put('events', ev);
  await App.go('event', {id: eventId});
}

async function archiveEvent(id) {

  ev.status = 'done'; ev.updatedAt = Date.now();

  const sess = ev.sessions?.find(s => s.id === sessionId);

      <div class="agenda-content">
        <div class="agenda-title">${a.title}</div>

    <div class="p-16 anim-up">

        <div>

            <input type="number" id="inp-lt-ms" value="${lapMs%1000}" min="0" max="999" step="100" style="width:56px">

          <span class="data-key">Conso (L/tour)</span>

            <input type="number" id="inp-conso" value="${fuelPL||''}" step="0.1" min="0" placeholder="—">

function buildAgenda(prog, lapMs) {
  const lapMin = Math.round(lapMs/60000*10)/10;
  const items = [
    {time:'0:00', title:'Tour de chauffe', desc:'1 tour pour chauffer les pneus, ne pas mesurer.', essential:true},
    {time:'~'+lapMin+'min', title:'Baseline lap', desc:`Relais de 3-5 tours en rythme constant. Mesure conso et temps au tour.`, essential:true},
  ];
  if (prog !== 'express') {
    items.push({time:`~${Math.round(lapMin*5)}min`, title:'Relais dégradation', desc:'10+ tours pour voir l\'évolution des pneus. Noter % à chaque pit.', essential:true});
  }
  if (prog === 'complet') {
    items.push({time:`~${Math.round(lapMin*15)}min`, title:'Test lift-and-coast', desc:'Comparer la conso avec et sans lift-and-coast sur la ligne droite.', essential:false});
    items.push({time:`~${Math.round(lapMin*18)}min`, title:'Chrono pitlane + pneus', desc:'Mesurer le temps de pitlane et le temps de changement de pneus seul.', essential:false});
  }
  return items;
}

async function saveSession(eventId, sessionId) {
  const ev = await DB.get('events', eventId);
  const sess = ev.sessions.find(s => s.id === sessionId);

  const ltM  = +el('inp-lt-m')?.value||0;
  const ltS  = +el('inp-lt-s')?.value||0;
  const ltMs = +el('inp-lt-ms')?.value||0;
  const lapTime = ltM*60000 + ltS*1000 + ltMs;
  const fuelPerLap = +el('inp-conso')?.value||null;
  const tyreDegPerLap = +el('inp-tyre')?.value||null;
  const notes = el('inp-notes')?.value||'';

  sess.measurements = { lapTime: lapTime||null, fuelPerLap, tyreDegPerLap };
  sess.notes = notes;
  sess.status = 'active';

  // Update event-level data if measured
  if (lapTime) ev.lapTime = lapTime;
  if (fuelPerLap) ev.fuelPerLap = fuelPerLap;
  ev.updatedAt = Date.now();

  await DB.put('events', ev);

  // Show feedback
  const btn = document.querySelector('[onclick*="saveSession"]');
  if (btn) { btn.textContent = '✓ Sauvegardé !'; setTimeout(()=>btn.textContent='Sauvegarder les données',2000); }
}

async function closeSession(eventId, sessionId) {
  await saveSession(eventId, sessionId);
  const ev = await DB.get('events', eventId);
  const sess = ev.sessions.find(s => s.id === sessionId);
  sess.status = 'done';
  ev.updatedAt = Date.now();
  await DB.put('events', ev);
  await App.go('event', {id: eventId});
}

/* ── STRATEGY ──────────────────────────────────────────────────── */
Pages.strategy = async ({eventId}) => {
  const ev = await DB.get('events', eventId);
  if (!ev) return App.go('home');

  const fuelPerLap = ev.fuelPerLap;
  const lapTime    = ev.lapTime;
  const laps       = ev.raceLaps;

  if (!fuelPerLap || !lapTime || !laps) {
    el('page').innerHTML = `<div class="p-16"><div class="info-note">Données insuffisantes. Complète au moins le temps au tour et la conso en session d'entraînement.</div><button class="btn btn-secondary btn-full mt-16" onclick="App.back()">← Retour</button></div>`;
    return;
  }

  const strats = Strat.compute({
    laps, lapTime, fuelPerLap,
    tankMax: ev.tankMax,
    fuelFixed: ev.fuelFixed ? ev.fuelFixedVal : null,
    minStops: ev.minStops, safetyCar: ev.safetyCar
  });

  const chosenIdx = ev.chosenStratIdx ?? 0;

  const stratCards = strats.map((s,i) => {
    const isChosen = i === chosenIdx;
    const stints = s.stintDetails.filter(d => d.type==='stint');
    const details = stints.map((d,j) => {
      // Compute pit lap for this stint
      const pitLap = stints.slice(0,j+1).reduce((acc,st) => acc + st.laps, 0);
      const pitInfo = j < stints.length-1 ? `<span style="color:var(--muted)">→ pit T${pitLap}</span>` : '';
      return `<div class="stint-row">
        <span>Relais ${j+1} — ${d.laps} tours ${pitInfo}</span>
        <span class="stint-row-fuel ${d.refuel?'refuel':''}">${d.refuel ? '⛽ +'+d.refuel+'L' : '🔋 '+d.fuel+'L'}</span>
      </div>`;
    }).join('');
    const stintsBar = Array.from({length:s.stints}, () => '<div class="stint-seg"></div>').join('');
    return `
      <div class="strat-card ${isChosen?'best':''}" id="strat-${i}">
        <div class="strat-header">
          <div><div class="strat-stops">${s.stops}</div><div class="strat-stops-lbl">ARRÊT${s.stops>1?'S':''}</div></div>
          <div class="strat-time">
            <div class="strat-total">${fmt(s.totalTime)}</div>
            <div class="strat-delta ${i===0?'ref':'slower'}">${i===0 ? 'OPTIMAL' : '+'+fmt(s.totalTime-strats[0].totalTime)}</div>
          </div>
          ${isChosen ? '<span class="badge badge-active" style="margin-left:8px">✓ CHOISIE</span>' : ''}
        </div>
        <div class="stints-bar">${stintsBar}</div>
        ${details}
        <div class="data-row mt-8"><span class="data-key">Carburant total</span><span class="data-val">${s.totalFuel}L</span></div>
        ${!isChosen ? `<button class="btn btn-secondary btn-full btn-sm mt-8" onclick="chooseStrat('${eventId}',${i})">Choisir cette stratégie</button>` : `<button class="btn btn-primary btn-full btn-sm mt-8" disabled>✓ Stratégie active pour la course</button>`}
      </div>`;
  }).join('');

  el('page').innerHTML = `
    <div class="p-16 anim-up">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.1em;margin-bottom:4px">Stratégies</div>
      <div class="label" style="display:block;margin-bottom:4px">${laps} tours · ${fuelPerLap}L/T · ${fmtLap(lapTime)}/tour</div>
      <div class="info-note mb-16" style="margin-bottom:16px">Choisis ta stratégie avant de démarrer la course. Le mode course utilisera ses données (carbu par relais, tour de pit) pour te guider en temps réel.</div>
      ${stratCards}
      <button class="btn btn-secondary btn-full mt-8" onclick="App.back()">← Retour</button>
    </div>`;
};

async function chooseStrat(eventId, idx) {
  const ev = await DB.get('events', eventId);
  ev.chosenStratIdx = idx;
  ev.updatedAt = Date.now();
  await DB.put('events', ev);
  await Pages.strategy({eventId});
}

/* ── RACE ──────────────────────────────────────────────────────── */
const Race = {
  timer: null, startTs: null, elapsed: 0,
  lap: 1, fuel: 0, tyres: 100,
  mode: 'highway',
  focusIdx: 0, focusItems: ['LAP','FUEL','TYRES','PIT'],
  ev: null, sess: null,
  strat: null   // stratégie choisie (objet complet calculé)
};

function getStratStints() {
  if (!Race.strat) return null;
  const stints = Race.strat.stintDetails.filter(d => d.type === 'stint');
  let lapCursor = 1;
  return stints.map((s, i) => {
    const startLap = lapCursor;
    const endLap   = lapCursor + s.laps - 1;
    lapCursor += s.laps;
    return { ...s, stintIdx: i, startLap, endLap, pitLap: i < stints.length - 1 ? endLap : null };
  });
}

function getCurrentStint() {
  const all = getStratStints();
  if (!all) return null;
  return all.find(s => Race.lap >= s.startLap && Race.lap <= s.endLap) || all[all.length - 1];
}

Pages.race = async ({eventId, sessionId}) => {
  const ev = await DB.get('events', eventId);
  Race.ev = ev;
  const sess = ev?.sessions?.find(s => s.id === sessionId);
  Race.sess = sess;

  if (sess?.status !== 'active') {
    // Pré-course : afficher résumé strat + choix mode
    const hasData = ev.fuelPerLap && ev.lapTime && ev.raceLaps;
    let stratSummary = '';
    if (hasData) {
      const strats = Strat.compute({
        laps: ev.raceLaps, lapTime: ev.lapTime, fuelPerLap: ev.fuelPerLap,
        tankMax: ev.tankMax, fuelFixed: ev.fuelFixed ? ev.fuelFixedVal : null,
        minStops: ev.minStops, safetyCar: ev.safetyCar
      });
      const chosenIdx = ev.chosenStratIdx ?? 0;
      const strat = strats[chosenIdx] || strats[0];
      const stints = strat.stintDetails.filter(d => d.type === 'stint');
      let lapC = 1;
      const rows = stints.map((s, j) => {
        const end = lapC + s.laps - 1;
        const pitLap = j < stints.length - 1 ? end : null;
        const row = `<div class="stint-row"><span>Relais ${j+1} — ${s.laps} tours${pitLap ? ' → pit T'+pitLap : ' → fin'}</span><span class="stint-row-fuel">${s.fuel}L départ relais</span></div>`;
        lapC += s.laps;
        return row;
      }).join('');
      stratSummary = `
        <div class="section-title" style="margin-top:16px"><span class="dot"></span>Stratégie active<span class="line"></span></div>
        <div class="card mb-8" style="border-color:var(--accent)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <span><span class="strat-stops">${strat.stops}</span> <span class="strat-stops-lbl">ARRÊT${strat.stops>1?'S':''}</span> · ${fmt(strat.totalTime)}</span>
            <span class="badge badge-active">✓ ACTIVE</span>
          </div>
          ${rows}
        </div>
        <button class="btn btn-secondary btn-full btn-sm mb-12" onclick="App.go('strategy',{eventId:'${eventId}'})">Changer de stratégie</button>`;
    } else {
      stratSummary = `<div class="info-note mb-12" style="margin-top:12px">⚠️ Pas de données (conso/temps au tour). Fais une EL d'abord. La course marchera mais sans guidage strat précis.</div>`;
    }

    el('page').innerHTML = `
      <div class="p-16 anim-up">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.1em;margin-bottom:4px">🏁 Départ course</div>
        <div class="label" style="display:block;margin-bottom:4px">${ev.name} · ${ev.raceLaps} tours</div>
        ${stratSummary}
        <div class="field mt-12">
          <label class="field-label">Mode d'affichage</label>
          <div class="seg-ctrl mb-8" id="race-mode-sel">
            <button class="seg-btn active" onclick="seg('race-mode-sel',0)">Autoroute</button>
            <button class="seg-btn" onclick="seg('race-mode-sel',1)">Focus Monaco</button>
          </div>
          <div class="field-hint">Autoroute = toutes les infos. Focus = une info à la fois, très gros.</div>
        </div>
        <button class="btn btn-primary btn-full btn-big btn-start mt-8" onclick="startRace('${eventId}','${sessionId}')">🚦 C'EST PARTI</button>
      </div>`;
    return;
  }

  // Reprise de course : restore strat
  if (sess?.raceState) Object.assign(Race, sess.raceState);
  if (ev.fuelPerLap && ev.lapTime) {
    const strats = Strat.compute({
      laps: ev.raceLaps, lapTime: ev.lapTime, fuelPerLap: ev.fuelPerLap,
      tankMax: ev.tankMax, fuelFixed: ev.fuelFixed ? ev.fuelFixedVal : null,
      minStops: ev.minStops, safetyCar: ev.safetyCar
    });
    Race.strat = strats[ev.chosenStratIdx ?? 0] || strats[0];
  }
  Race.mode === 'focus' ? renderFocus(eventId, sessionId) : renderRace(eventId, sessionId);
};

function startRace(eventId, sessionId) {
  const modeIdx = [...el('race-mode-sel').querySelectorAll('.seg-btn')].findIndex(b => b.classList.contains('active'));
  Race.mode = modeIdx === 1 ? 'focus' : 'highway';
  Race.lap = 1; Race.elapsed = 0;
  Race.fuel = Race.ev.tankMax;
  Race.tyres = Race.ev.tyreConv === '0to100' ? 0 : 100;

  const ev = Race.ev;
  if (ev.fuelPerLap && ev.lapTime) {
    const strats = Strat.compute({
      laps: ev.raceLaps, lapTime: ev.lapTime, fuelPerLap: ev.fuelPerLap,
      tankMax: ev.tankMax, fuelFixed: ev.fuelFixed ? ev.fuelFixedVal : null,
      minStops: ev.minStops, safetyCar: ev.safetyCar
    });
    Race.strat = strats[ev.chosenStratIdx ?? 0] || strats[0];
    // Initialiser le carbu du premier relais
    const firstStint = Race.strat.stintDetails.find(d => d.type === 'stint');
    if (firstStint) Race.fuel = firstStint.fuel;
  } else {
    Race.strat = null;
  }

  DB.get('events', eventId).then(ev => {
    const sess = ev.sessions.find(s => s.id === sessionId);
    sess.status = 'active';
    ev.updatedAt = Date.now();
    return DB.put('events', ev);
  }).then(() => Race.mode === 'focus' ? renderFocus(eventId, sessionId) : renderRace(eventId, sessionId));
}

function renderRace(eventId, sessionId) {
  const ev = Race.ev;
  const laps = ev.raceLaps;
  const fuelPL = ev.fuelPerLap || null;
  const all = getStratStints();
  const cur = getCurrentStint();

  // Pit window depuis la strat
  let pitWindowPct = 0, pitWindowClass = 'safe', pitMsg = '';
  if (cur && cur.pitLap != null) {
    const lapsLeft = cur.endLap - Race.lap;
    const prog = 1 - lapsLeft / Math.max(1, cur.laps);
    pitWindowPct = Math.min(100, Math.round(prog * 100));
    pitWindowClass = lapsLeft > 5 ? 'safe' : lapsLeft > 2 ? 'ideal' : lapsLeft > 0 ? 'warning' : 'critical';
    pitMsg = lapsLeft > 0 ? `Pit dans ${lapsLeft} tour${lapsLeft>1?'s':''} · T${cur.pitLap}` : '🔴 PITTER MAINTENANT';
  } else {
    pitWindowPct = Math.min(100, Math.round((Race.lap/laps)*100));
    pitWindowClass = Race.lap/laps < 0.7 ? 'safe' : Race.lap/laps < 0.9 ? 'ideal' : 'warning';
    pitMsg = cur ? `Relais ${cur.stintIdx+1} — dernier stint` : 'Aucune strat chargée';
  }

  // Carburant vs strat
  const fuelPct = Math.max(0, Math.min(100, (Race.fuel / ev.tankMax) * 100));
  const fuelClass = fuelPct > 30 ? '' : fuelPct > 15 ? 'low' : 'critical';
  const fuelExp = cur && fuelPL ? round1(cur.fuel - (Race.lap - cur.startLap) * fuelPL) : null;
  const delta = fuelExp != null ? round1(Race.fuel - fuelExp) : null;
  const deltaHtml = delta != null
    ? ` <span style="color:${delta>1?'var(--green)':delta<-2?'var(--red)':'var(--muted)'}">${delta>0?'+':''}${delta}L vs strat</span>`
    : '';

  // Tyres
  const tv = Race.tyres;
  const tyreConv = ev.tyreConv === '0to100';
  const tc = tyreConv ? (tv>80?'':tv>60?'warn':'crit') : (tv>40?'':tv>20?'warn':'crit');

  // Stint indicator
  const stintBar = all ? `
    <div class="card" style="padding:10px 16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span class="label">Relais ${cur?cur.stintIdx+1:'?'}/${all.length} ${cur&&cur.pitLap?'· '+pitMsg:''}</span>
        <span class="label" style="color:${pitWindowClass==='critical'?'var(--red)':pitWindowClass==='warning'?'var(--accent2)':pitWindowClass==='ideal'?'var(--accent)':'var(--green)'}">${pitWindowClass.toUpperCase()}</span>
      </div>
      <div class="pit-window" style="margin:0"><div class="pit-window-fill ${pitWindowClass}" style="width:${pitWindowPct}%"></div></div>
      ${!cur?.pitLap?`<div class="label" style="margin-top:4px">${pitMsg}</div>`:''}
    </div>` : '';

  el('page').innerHTML = `
    <div style="padding:12px 16px;display:flex;flex-direction:column;gap:10px">

      <div class="card card-accent-top" style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="focus-label">Tour</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--accent);line-height:1">${Race.lap}<span style="font-size:1.2rem;color:var(--muted)">/${laps}</span></div>
        </div>
        <div style="text-align:right">
          <div class="focus-label">Temps course</div>
          <div class="chrono running" id="race-chrono">${fmt(Race.elapsed)}</div>
        </div>
      </div>

      ${stintBar || `<div class="pit-window"><div class="pit-window-fill ${pitWindowClass}" style="width:${pitWindowPct}%"></div></div>`}

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div><span class="label">Carburant</span>${deltaHtml}</div>
          <div class="inline-edit">
            <input type="number" id="fuel-inp" value="${round1(Race.fuel)}" step="0.5" min="0" onchange="updateFuel(this.value)" style="width:60px">
            <span class="inline-edit unit-label">L</span>
          </div>
        </div>
        <div class="fuel-bar-wrap"><div class="fuel-bar-fill ${fuelClass}" style="width:${fuelPct}%"></div></div>
        <div class="label" style="margin-top:4px">
          ${fuelPL ? `~${Math.max(0,Math.floor(Race.fuel/fuelPL))} tours restants` : 'Conso non mesurée'}
          ${fuelExp != null ? ` · Strat: ${fuelExp}L attendus` : ''}
        </div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span class="label">Pneus</span>
          <div class="inline-edit">
            <input type="number" id="tyre-inp" value="${tv}" min="0" max="100" onchange="updateTyres(this.value)" style="width:56px">
            <span class="inline-edit unit-label">%</span>
          </div>
        </div>
        <div class="tyre-grid">
          <div class="tyre-box"><div class="tyre-pos">FL</div><div class="tyre-val ${tc}">${tv}%</div></div>
          <div class="tyre-box"><div class="tyre-pos">FR</div><div class="tyre-val ${tc}">${tv}%</div></div>
          <div class="tyre-box"><div class="tyre-pos">RL</div><div class="tyre-val ${tc}">${tv}%</div></div>
          <div class="tyre-box"><div class="tyre-pos">RR</div><div class="tyre-val ${tc}">${tv}%</div></div>
        </div>
      </div>

      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="flex:1" onclick="nextLap('${eventId}','${sessionId}')">+ Tour</button>
        <button class="btn btn-secondary" style="flex:1" onclick="Race.focusIdx=0;Race.mode='focus';renderFocus('${eventId}','${sessionId}')">Focus</button>
      </div>
      ${ev.safetyCar ? `<button class="btn btn-big btn-sc" onclick="safetyCarModal('${eventId}','${sessionId}')">🟡 SAFETY CAR</button>` : ''}
      <button class="btn btn-big btn-pit" onclick="pitModal('${eventId}','${sessionId}')">🔴 PIT</button>
      <button class="btn btn-secondary btn-full btn-sm" onclick="endRace('${eventId}','${sessionId}')">Terminer la course</button>
      <div style="height:16px"></div>
    </div>`;

  startTimer(eventId, sessionId);
}

function renderFocus(eventId, sessionId) {
  const items = Race.focusItems;
  const idx = Race.focusIdx % items.length;
  const ev = Race.ev;
  const fuelPL = ev.fuelPerLap || null;
  const cur = getCurrentStint();
  const it = items[idx];

  let val='', label='', sub='';
  if (it==='LAP') {
    val = Race.lap+'/'+ev.raceLaps; label = 'TOUR';
    sub = cur ? `Relais ${cur.stintIdx+1}/${getStratStints()?.length||'?'}` : '';
  } else if (it==='FUEL') {
    val = round1(Race.fuel)+'L'; label = 'CARBURANT';
    const exp = cur&&fuelPL ? round1(cur.fuel-(Race.lap-cur.startLap)*fuelPL) : null;
    sub = exp!=null ? `Strat: ${exp}L · δ ${round1(Race.fuel-exp)>0?'+':''}${round1(Race.fuel-exp)}L` : '';
  } else if (it==='TYRES') {
    val = Race.tyres+'%'; label = 'PNEUS';
  } else if (it==='PIT') {
    const ll = cur?.pitLap!=null ? cur.endLap - Race.lap : null;
    val = ll!=null ? (ll>0?ll+'T':'NOW') : '?'; label = 'AVANT PIT';
    sub = cur?.pitLap ? `Pit prévu: T${cur.pitLap}` : 'Dernier stint';
  }

  el('page').innerHTML = `
    <div style="display:flex;flex-direction:column;height:calc(100dvh - 61px);padding:24px 16px;gap:16px">
      <div style="display:flex;gap:4px">
        ${items.map((_,i)=>`<div style="height:4px;flex:1;background:${i===idx?'var(--accent)':'var(--border)'};transition:.3s"></div>`).join('')}
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px">
        <div class="focus-label">${label}</div>
        <div class="focus-val">${val}</div>
        <div class="chrono running" id="race-chrono">${fmt(Race.elapsed)}</div>
        ${sub?`<div class="label" style="margin-top:4px;text-align:center">${sub}</div>`:''}
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="flex:1" onclick="Race.focusIdx=(Race.focusIdx-1+${items.length})%${items.length};renderFocus('${eventId}','${sessionId}')">←</button>
        <button class="btn btn-secondary" style="flex:1" onclick="Race.focusIdx=(Race.focusIdx+1)%${items.length};renderFocus('${eventId}','${sessionId}')">→</button>
        <button class="btn btn-secondary" style="flex:1" onclick="nextLap('${eventId}','${sessionId}');renderFocus('${eventId}','${sessionId}')">+LAP</button>
      </div>
      ${ev.safetyCar?`<button class="btn btn-big btn-sc" onclick="safetyCarModal('${eventId}','${sessionId}')">🟡 SC</button>`:''}
      <button class="btn btn-big btn-pit" onclick="pitModal('${eventId}','${sessionId}')">🔴 PIT</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="flex:1" onclick="Race.mode='highway';renderRace('${eventId}','${sessionId}')">Vue complète</button>
        <button class="btn btn-secondary" style="flex:1" onclick="endRace('${eventId}','${sessionId}')">Fin</button>
      </div>
    </div>`;

  startTimer(eventId, sessionId);
}

function startTimer(eventId, sessionId) {
  if (Race.timer) clearInterval(Race.timer);
  Race.startTs = Date.now() - Race.elapsed;
  Race.timer = setInterval(() => {
    Race.elapsed = Date.now() - Race.startTs;
    const chronoEl = el('race-chrono');
    if (chronoEl) chronoEl.textContent = fmt(Race.elapsed);
  }, 500);
}

function nextLap(eventId, sessionId) {
  Race.lap = Math.min(Race.lap + 1, Race.ev.raceLaps);
  const fuelPL = Race.ev.fuelPerLap;
  if (fuelPL) Race.fuel = Math.max(0, Race.fuel - fuelPL);
  const tyreDeg = Race.ev.tyreDegPerLap || 2;
  if (Race.ev.tyreConv === '0to100') Race.tyres = Math.min(100, Race.tyres + tyreDeg);
  else Race.tyres = Math.max(0, Race.tyres - tyreDeg);

  saveRaceState(eventId, sessionId);
}

function updateFuel(v) { Race.fuel = +v; saveRaceState(Race.ev.id, Race.sess.id); }
function updateTyres(v) { Race.tyres = +v; saveRaceState(Race.ev.id, Race.sess.id); }

async function saveRaceState(eventId, sessionId) {
  const ev = await DB.get('events', eventId);
  const sess = ev.sessions.find(s => s.id === sessionId);
  sess.raceState = { lap: Race.lap, fuel: Race.fuel, tyres: Race.tyres, elapsed: Race.elapsed, mode: Race.mode };
  ev.updatedAt = Date.now();
  await DB.put('events', ev);
}

function pitModal(eventId, sessionId) {
  const ev = Race.ev;
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-title">🔴 ARRÊT AUX STANDS</div>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      <div class="field">
        <label class="field-label">Carburant ajouté</label>
        <div class="input-unit"><input type="number" id="pit-fuel" value="${ev.fuelFixed ? ev.fuelFixedVal : ev.tankMax - Race.fuel}" step="0.5"><span class="unit">L</span></div>
      </div>
      <div class="field">
        <label class="field-label">Pneus changés ?</label>
        <div class="seg-ctrl" id="pit-tyre">
          <button class="seg-btn active" onclick="seg('pit-tyre',0)">Oui</button>
          <button class="seg-btn" onclick="seg('pit-tyre',1)">Non</button>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Notes stand</label>
        <textarea id="pit-notes" placeholder="Réglages, infos mécaniques..."></textarea>
      </div>
      <button class="btn btn-primary btn-full" onclick="confirmPit('${eventId}','${sessionId}',this)">✓ Confirmer l'arrêt</button>
    </div>`;
  document.body.appendChild(modal);
}

function confirmPit(eventId, sessionId, btn) {
  const fuelAdded = +el('pit-fuel')?.value || 0;
  const tyreChanged = el('pit-tyre')?.querySelector('.active')?.textContent === 'Oui';
  Race.fuel = Math.min(Race.ev.tankMax, Race.fuel + fuelAdded);
  if (tyreChanged) Race.tyres = Race.ev.tyreConv === '0to100' ? 0 : 100;
  btn.closest('.modal-overlay').remove();
  saveRaceState(eventId, sessionId);
  Race.mode === 'focus' ? renderFocus(eventId, sessionId) : renderRace(eventId, sessionId);
}

function safetyCarModal(eventId, sessionId) {
  const strats = Strat.compute({
    laps: Race.ev.raceLaps, lapTime: Race.ev.lapTime, fuelPerLap: Race.ev.fuelPerLap,
    tankMax: Race.ev.tankMax, fuelFixed: Race.ev.fuelFixed ? Race.ev.fuelFixedVal : null,
    minStops: Race.ev.minStops, safetyCar: true
  });
  const best = strats[0];
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-title">🟡 SAFETY CAR</div>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      <div class="info-note" style="margin-bottom:16px">Tour ${Race.lap}/${Race.ev.raceLaps} · Stratégie SC recommande ${best.stops} arrêt${best.stops>1?'s':''}.</div>
      <p style="font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--text);margin-bottom:16px">Veux-tu rentrer maintenant ?</p>
      <div style="display:flex;gap:8px">
        <button class="btn btn-danger" style="flex:1" onclick="pitModal('${eventId}','${sessionId}');this.closest('.modal-overlay').remove()">OUI → Pit</button>
        <button class="btn btn-secondary" style="flex:1" onclick="this.closest('.modal-overlay').remove()">NON → Rester</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function endRace(eventId, sessionId) {
  if (Race.timer) clearInterval(Race.timer);
  const ev = await DB.get('events', eventId);
  const sess = ev.sessions.find(s => s.id === sessionId);
  sess.status = 'done';
  sess.raceState = { lap: Race.lap, fuel: Race.fuel, tyres: Race.tyres, elapsed: Race.elapsed };
  ev.status = 'done';
  ev.updatedAt = Date.now();
  await DB.put('events', ev);

  el('page').innerHTML = `
    <div class="p-16 anim-up">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.1em;color:var(--accent);margin-bottom:8px">🏁 Terminé !</div>
      <div class="card mb-16">
        <div class="data-row"><span class="data-key">Tours bouclés</span><span class="data-val">${Race.lap}</span></div>
        <div class="data-row"><span class="data-key">Temps total</span><span class="data-val">${fmt(Race.elapsed)}</span></div>
        <div class="data-row"><span class="data-key">Carburant restant</span><span class="data-val">${round1(Race.fuel)}L</span></div>
        <div class="data-row"><span class="data-key">État pneus final</span><span class="data-val">${Race.tyres}%</span></div>
      </div>
      <button class="btn btn-primary btn-full" onclick="App.go('home')">← Retour accueil</button>
    </div>`;
}

Pages.carEdit = async ({id}={}) => {
  const car = id ? await DB.get('cars', id) : null;
  el('page').innerHTML = `
    <div class="p-16 anim-up">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.1em;margin-bottom:16px">${car?'Modifier':'Nouvelle voiture'}</div>
      <div class="field"><label class="field-label">Nom<span class="req">*</span></label><input type="text" id="c-name" value="${car?.name||''}"></div>
      <div class="field"><label class="field-label">Réservoir (L)<span class="req">*</span></label><div class="input-unit"><input type="number" id="c-tank" value="${car?.tankMax||100}"><span class="unit">L</span></div></div>
      <div class="field"><label class="field-label">Conso (L/tour)</label><div class="input-unit"><input type="number" id="c-conso" step="0.1" value="${car?.fuelPerLap||''}"><span class="unit">L/T</span></div></div>
      <div class="field"><label class="field-label">Convention pneus</label><div class="seg-ctrl" id="c-tyreconv"><button class="seg-btn ${car?.tyreConv!=='0to100'?'active':''}" onclick="seg('c-tyreconv',0)">100→0</button><button class="seg-btn ${car?.tyreConv==='0to100'?'active':''}" onclick="seg('c-tyreconv',1)">0→100</button></div></div>
      <div id="c-err" class="error-box mt-8"></div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-secondary" style="flex:1" onclick="App.back()">Annuler</button>
        <button class="btn btn-primary" style="flex:2" onclick="saveCar('${id||''}')">Sauvegarder</button>
      </div>
      ${id ? `<button class="btn btn-danger btn-full btn-sm mt-12" onclick="deleteCar('${id}')">Supprimer</button>` : ''}
    </div>`;
};

async function saveCar(id) {
  const name = el('c-name')?.value.trim();
  const tankMax = +el('c-tank')?.value;
  const errEl = el('c-err');
  if (!name) { errEl.textContent='Nom obligatoire'; errEl.classList.add('show'); return; }
  if (!tankMax) { errEl.textContent='Réservoir obligatoire'; errEl.classList.add('show'); return; }
  const car = {
    id: id || uid(), name, tankMax,
    fuelPerLap: +el('c-conso')?.value || null,
    tyreConv: el('c-tyreconv')?.querySelector('.active')?.textContent === '0→100' ? '0to100' : '100to0',
    updatedAt: Date.now()
  };
  if (!id) car.createdAt = Date.now();
  await DB.put('cars', car);
  await App.back();
}

async function deleteCar(id) {
  await DB.del('cars', id);
  await App.go('cars');
}

/* ── BOOT ──────────────────────────────────────────────────────── */
App.init();
</script>
</body>
</html>
